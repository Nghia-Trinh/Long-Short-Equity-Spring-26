[build]
  command = "rm -rf public && mkdir -p public/outputs && cp -R netlify_site/. public/ && cp -R outputs/llm_long_short public/outputs/llm_long_short"
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/process"
  to = "/.netlify/functions/factset-process"
  status = 200
  force = true

[[redirects]]
  from = "/api/llm-factset/*"
  to = "/.netlify/functions/factset-process"
  status = 200
  force = true

[[redirects]]
  from = "/streamlit"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/model-results"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
